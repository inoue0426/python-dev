[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "W",
]
ignore = []

[tool.mypy]
python_version = "3.11"
warn_unreachable = true
warn_unused_configs = true
ignore_missing_imports = true
strict_optional = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]

[tool.coverage.run]
branch = true
source = ["."]
omit = [
    ".venv/*",
    "venv/*",
    "tests/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = true
